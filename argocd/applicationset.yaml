apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ecommerce-applicationset
spec:
  generators:
  - directory:
      path: kubernetes
      recurse: false
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: ecommerce
      source:
        repoURL: 'https://github.com/your-org/your-repo.git'
        targetRevision: HEAD
        path: '{{path}}'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: ecommerce
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
