apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ecommerce
spec:
  description: Ecommerce monorepo GitOps project
  sourceRepos:
  - '*'
  destinations:
  - namespace: ecommerce
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
