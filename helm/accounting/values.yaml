name: opentelemetry-demo-accountingservice
service:
  name: opentelemetry-demo-accountingservice
  type: ClusterIP
  port: 80
  targetPort: 80
selectorLabels:
  opentelemetry.io/name: opentelemetry-demo-accountingservice
templateLabels:
  opentelemetry.io/name: opentelemetry-demo-accountingservice
  app.kubernetes.io/instance: opentelemetry-demo
  app.kubernetes.io/component: accountingservice
  app.kubernetes.io/name: opentelemetry-demo-accountingservice
replicaCount: 2
serviceAccountName: opentelemetry-demo
image:
  repository: ghcr.io/open-telemetry/demo
  tag: 1.12.0-accountingservice
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 120Mi
env:
- name: OTEL_SERVICE_NAME
  valueFrom:
    fieldRef:
      apiVersion: v1
      fieldPath: metadata.labels['app.kubernetes.io/component']
- name: OTEL_COLLECTOR_NAME
  value: opentelemetry-demo-otelcol
- name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
  value: cumulative
- name: KAFKA_SERVICE_ADDR
  value: opentelemetry-demo-kafka:9092
- name: OTEL_EXPORTER_OTLP_ENDPOINT
  value: http://$(OTEL_COLLECTOR_NAME):4318
- name: OTEL_RESOURCE_ATTRIBUTES
  value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.12.0
volumeMounts: []
initContainers:
- command:
  - sh
  - -c
  - until nc -z -v -w30 opentelemetry-demo-kafka 9092; do echo waiting for kafka;
    sleep 2; done;
  image: busybox:latest
  name: wait-for-kafka
volumes: []
readinessProbe: {}
livenessProbe: {}
ingress:
  enabled: false
  annotations: {}
  spec: {}
configMaps: []
