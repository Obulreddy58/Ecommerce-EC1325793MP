name: opentelemetry-demo-frontend
service:
  name: opentelemetry-demo-frontend
  type: ClusterIP
  port: 8080
  targetPort: 8080
selectorLabels:
  opentelemetry.io/name: opentelemetry-demo-frontend
templateLabels:
  opentelemetry.io/name: opentelemetry-demo-frontend
  app.kubernetes.io/instance: opentelemetry-demo
  app.kubernetes.io/component: frontend
  app.kubernetes.io/name: opentelemetry-demo-frontend
replicaCount: 2
serviceAccountName: opentelemetry-demo
image:
  repository: ghcr.io/open-telemetry/demo
  tag: 1.12.0-frontend
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 150m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 250Mi
env:
- name: OTEL_SERVICE_NAME
  valueFrom:
    fieldRef:
      apiVersion: v1
      fieldPath: metadata.labels['app.kubernetes.io/component']
- name: OTEL_COLLECTOR_NAME
  value: opentelemetry-demo-otelcol
- name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
  value: cumulative
- name: FRONTEND_PORT
  value: '8080'
- name: FRONTEND_ADDR
  value: :8080
- name: AD_SERVICE_ADDR
  value: opentelemetry-demo-adservice:8080
- name: CART_SERVICE_ADDR
  value: opentelemetry-demo-cartservice:8080
- name: CHECKOUT_SERVICE_ADDR
  value: opentelemetry-demo-checkoutservice:8080
- name: CURRENCY_SERVICE_ADDR
  value: opentelemetry-demo-currencyservice:8080
- name: PRODUCT_CATALOG_SERVICE_ADDR
  value: opentelemetry-demo-productcatalogservice:8080
- name: RECOMMENDATION_SERVICE_ADDR
  value: opentelemetry-demo-recommendationservice:8080
- name: SHIPPING_SERVICE_ADDR
  value: opentelemetry-demo-shippingservice:8080
- name: FLAGD_HOST
  value: opentelemetry-demo-flagd
- name: FLAGD_PORT
  value: '8013'
- name: OTEL_COLLECTOR_HOST
  value: $(OTEL_COLLECTOR_NAME)
- name: OTEL_EXPORTER_OTLP_ENDPOINT
  value: http://$(OTEL_COLLECTOR_NAME):4317
- name: WEB_OTEL_SERVICE_NAME
  value: frontend-web
- name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
  value: http://localhost:8080/otlp-http/v1/traces
- name: OTEL_RESOURCE_ATTRIBUTES
  value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.12.0
volumeMounts: []
initContainers: []
volumes: []
readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
livenessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
ingress:
  enabled: false
  annotations: {}
  spec: {}
configMaps: []
