name: opentelemetry-demo-imageprovider
service:
  name: opentelemetry-demo-imageprovider
  type: ClusterIP
  port: 8081
  targetPort: 8081
selectorLabels:
  opentelemetry.io/name: opentelemetry-demo-imageprovider
templateLabels:
  opentelemetry.io/name: opentelemetry-demo-imageprovider
  app.kubernetes.io/instance: opentelemetry-demo
  app.kubernetes.io/component: imageprovider
  app.kubernetes.io/name: opentelemetry-demo-imageprovider
replicaCount: 2
serviceAccountName: opentelemetry-demo
image:
  repository: ghcr.io/open-telemetry/demo
  tag: 1.12.0-imageprovider
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 100m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 50Mi
env:
- name: OTEL_SERVICE_NAME
  valueFrom:
    fieldRef:
      apiVersion: v1
      fieldPath: metadata.labels['app.kubernetes.io/component']
- name: OTEL_COLLECTOR_NAME
  value: opentelemetry-demo-otelcol
- name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
  value: cumulative
- name: IMAGE_PROVIDER_PORT
  value: '8081'
- name: OTEL_COLLECTOR_PORT_GRPC
  value: '4317'
- name: OTEL_COLLECTOR_HOST
  value: $(OTEL_COLLECTOR_NAME)
- name: OTEL_RESOURCE_ATTRIBUTES
  value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.12.0
volumeMounts: []
initContainers: []
volumes: []
readinessProbe:
  tcpSocket:
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
livenessProbe:
  tcpSocket:
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
ingress:
  enabled: false
  annotations: {}
  spec: {}
configMaps: []
