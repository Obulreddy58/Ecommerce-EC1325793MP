name: opentelemetry-demo-cartservice
service:
  name: opentelemetry-demo-cartservice
  type: ClusterIP
  port: 8080
  targetPort: 8080
selectorLabels:
  opentelemetry.io/name: opentelemetry-demo-cartservice
templateLabels:
  opentelemetry.io/name: opentelemetry-demo-cartservice
  app.kubernetes.io/instance: opentelemetry-demo
  app.kubernetes.io/component: cartservice
  app.kubernetes.io/name: opentelemetry-demo-cartservice
replicaCount: 2
serviceAccountName: opentelemetry-demo
image:
  repository: ghcr.io/open-telemetry/demo
  tag: 1.12.0-cartservice
  pullPolicy: IfNotPresent
resources:
  requests:
    cpu: 150m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 160Mi
env:
- name: OTEL_SERVICE_NAME
  valueFrom:
    fieldRef:
      apiVersion: v1
      fieldPath: metadata.labels['app.kubernetes.io/component']
- name: OTEL_COLLECTOR_NAME
  value: opentelemetry-demo-otelcol
- name: OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE
  value: cumulative
- name: CART_SERVICE_PORT
  value: '8080'
- name: ASPNETCORE_URLS
  value: http://*:$(CART_SERVICE_PORT)
- name: VALKEY_ADDR
  value: opentelemetry-demo-valkey:6379
- name: FLAGD_HOST
  value: opentelemetry-demo-flagd
- name: FLAGD_PORT
  value: '8013'
- name: OTEL_EXPORTER_OTLP_ENDPOINT
  value: http://$(OTEL_COLLECTOR_NAME):4317
- name: OTEL_RESOURCE_ATTRIBUTES
  value: service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=1.12.0
volumeMounts: []
initContainers:
- command:
  - sh
  - -c
  - until nc -z -v -w30 opentelemetry-demo-valkey 6379; do echo waiting for valkey;
    sleep 2; done;
  image: busybox:latest
  name: wait-for-valkey
volumes: []
readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
livenessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5
ingress:
  enabled: false
  annotations: {}
  spec: {}
configMaps: []
